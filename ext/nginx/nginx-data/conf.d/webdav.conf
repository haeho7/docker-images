# https://webdav.local.aimoyu.cc
server {
    listen 443 ssl http2;
    server_name webdav.local.aimoyu.cc;

    ssl_certificate /cert/local.aimoyu.cc_ecc/fullchain.cer;
    ssl_certificate_key /cert/local.aimoyu.cc_ecc/local.aimoyu.cc.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_ecdh_curve X25519:prime256v1:secp384r1:secp521r1;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 192.168.1.254 119.29.29.29 ipv6=off;
    resolver_timeout 10s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";

    location / {
        proxy_pass http://192.168.1.250:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # proxy_buffering
        proxy_buffering off;
    }

    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
    }
}


# https://webdav.aimoyu.cc
server {
    listen 443 ssl http2;
    server_name webdav.aimoyu.cc;

    # only allow GET and POST request methods
    if ($request_method !~ ^(GET|POST)$ ) { return 444; }

    # deny user-agent
    if ($http_user_agent ~* LWP::Simple|BBBike|wget|curl) { return 403;}

    ssl_certificate /cert/aimoyu.cc_ecc/fullchain.cer;
    ssl_certificate_key /cert/aimoyu.cc_ecc/aimoyu.cc.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_ecdh_curve X25519:prime256v1:secp384r1:secp521r1;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 192.168.1.254 119.29.29.29 ipv6=off;
    resolver_timeout 10s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";

    location / {
        proxy_pass http://192.168.1.250:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # proxy_buffering
        proxy_buffering off;
    }

    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
    }  
}
