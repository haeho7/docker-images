version: '3.9'

services:
  webdav:
    image: haeho7/docker-images:webdav
    container_name: webdav
    restart: unless-stopped
    network_mode: bridge
    environment:
      PUID: 99
      PGID: 100
      UMASK: 000
      TZ: Asia/Shanghai
    ports:
      - 8080:8080
    volumes:
      - /mnt/user/appdata/webdav/config.yml:/etc/webdav/config.yml
      - /mnt/user/datas/webdav:/data
      # - /etc/localtime:/etc/localtime:ro
